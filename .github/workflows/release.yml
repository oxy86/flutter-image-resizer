name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  macos:
    name: macOS app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build macOS app
        run: flutter build macos --release

      - name: Import Developer ID certificate
        run: |
          echo "${{ secrets.MACOS_CERTIFICATE }}" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security list-keychains -d user -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "${{ secrets.MACOS_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "" build.keychain
          rm -f certificate.p12
          security find-identity -v -p codesigning build.keychain
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" \
            | head -1 \
            | sed -E 's/.*"(.+)".*/\1/')
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "No Developer ID Application signing identity found in build.keychain"
            exit 1
          fi
          echo "MACOS_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Store notarization credentials
        run: |
          xcrun notarytool store-credentials "AC_PASSWORD" \
            --apple-id "${{ secrets.AC_APPLE_ID }}" \
            --team-id "${{ secrets.AC_TEAM_ID }}" \
            --password "${{ secrets.AC_PASSWORD }}"

      - name: Sign macOS app
        run: |
          app="build/macos/Build/Products/Release/flutter_image_resizer.app"
          find "$app" -type f -exec xattr -c {} \;
          codesign --deep --force --verbose \
            --options runtime \
            --entitlements macos/Runner/Notarization.entitlements \
            --sign "$MACOS_SIGNING_IDENTITY" \
            "$app"
          codesign --verify --deep --strict --verbose=2 "$app"

      - name: Create signed DMG
        run: |
          mkdir -p dist
          hdiutil create \
            -volname "Image Resizer" \
            -srcfolder build/macos/Build/Products/Release/flutter_image_resizer.app \
            -ov \
            -format UDZO \
            "dist/flutter_image_resizer-${GITHUB_REF_NAME}-macos.dmg"
          codesign --force \
            --sign "$MACOS_SIGNING_IDENTITY" \
            "dist/flutter_image_resizer-${GITHUB_REF_NAME}-macos.dmg"

      - name: Notarize and staple DMG
        run: |
          dmg="dist/flutter_image_resizer-${GITHUB_REF_NAME}-macos.dmg"
          submit_output=$(xcrun notarytool submit \
            "$dmg" \
            --keychain-profile "AC_PASSWORD" \
            --wait 2>&1)
          echo "$submit_output"

          submission_id=$(echo "$submit_output" | awk '/id:/ {print $2; exit}')
          status=$(echo "$submit_output" | awk '/status:/ {print $2; exit}')

          if [[ "$status" != "Accepted" ]]; then
            echo "Notarization failed with status: ${status:-unknown}"
            if [[ -n "$submission_id" ]]; then
              xcrun notarytool log \
                "$submission_id" \
                --keychain-profile "AC_PASSWORD" \
                notarization-log.json
              cat notarization-log.json
            fi
            exit 1
          fi

          xcrun stapler staple "$dmg"
          xcrun stapler validate "$dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*.dmg

  linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            curl \
            file \
            libgtk-3-dev \
            liblzma-dev \
            ninja-build \
            pkg-config

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Linux app
        run: flutter build linux --release

      - name: Create AppDir
        run: bash scripts/linux/create_appimage_appdir.sh

      - name: Download appimagetool
        run: |
          curl -L \
            -o appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Build AppImage
        env:
          ARCH: x86_64
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          mkdir -p dist
          ./appimagetool \
            build/linux/AppDir \
            "dist/flutter_image_resizer-${GITHUB_REF_NAME}-linux-x86_64.AppImage"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*.AppImage

  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build Windows app
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows setup
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${env:GITHUB_REF_NAME}" `
            installers\windows\flutter_image_resizer.iss

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*.exe

  release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs:
      - macos
      - linux
      - windows
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
