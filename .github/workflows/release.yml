name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  macos:
    name: macOS app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build macOS app
        run: flutter build macos --release

      - name: Package macOS app
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/flutter_image_resizer.app \
            "dist/flutter_image_resizer-${GITHUB_REF_NAME}-macos.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*.zip

  linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            curl \
            file \
            libgtk-3-dev \
            liblzma-dev \
            ninja-build \
            pkg-config

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Linux app
        run: flutter build linux --release

      - name: Create AppDir
        run: bash scripts/linux/create_appimage_appdir.sh

      - name: Download appimagetool
        run: |
          curl -L \
            -o appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Build AppImage
        env:
          ARCH: x86_64
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          mkdir -p dist
          ./appimagetool \
            build/linux/AppDir \
            "dist/flutter_image_resizer-${GITHUB_REF_NAME}-linux-x86_64.AppImage"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*.AppImage

  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build Windows app
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows setup
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${env:GITHUB_REF_NAME}" `
            installers\windows\flutter_image_resizer.iss

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*.exe

  release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs:
      - macos
      - linux
      - windows
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
